apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: nightly-wide-ep-prefill
  labels:
    kueue.x-k8s.io/queue-name: nightly-eval
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: DeepSeek-V4-Pro
    llm-d.ai/role: prefill
    llm-d.ai/deployment: pd
spec:
  replicas: 1
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 100%
  leaderWorkerTemplate:
    size: 2
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/inference-serving: "true"
          llm-d.ai/model: DeepSeek-V4-Pro
          llm-d.ai/role: prefill
          llm-d.ai/deployment: pd
          llm-d.ai/owner: nightly
      spec:
        serviceAccountName: nightly-deepseek-v4
        terminationGracePeriodSeconds: 0
        nodeSelector:
          oci.oraclecloud.com/rack-name: oci-bth-aiaccelerator-prd005-hpc-rack-1
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
          - name: local-nvme
            hostPath:
              path: /mnt/numa0
              type: Directory
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        containers:
          - name: vllm
            image: VLLM_IMAGE_PLACEHOLDER
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                set -euo pipefail
                LOG_DIR=/mnt/lustre/nightly/logs/prefill
                mkdir -p "$LOG_DIR"
                LOG_FILE="$LOG_DIR/${HOSTNAME}_$(date +%Y%m%d-%H%M%S).log"
                exec > >(tee -a "$LOG_FILE") 2>&1
                echo "=== Pod $HOSTNAME started at $(date -Iseconds) ==="

                find /dev/shm -type f -delete

                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * 4 ))

                exec vllm serve \
                  deepseek-ai/DeepSeek-V4-Pro \
                  --port 8000 \
                  --tokenizer-mode deepseek_v4 \
                  --gpu-memory-utilization 0.85 \
                  --trust-remote-code \
                  --api-server-count 1 \
                  --disable-uvicorn-access-log \
                  --data-parallel-hybrid-lb \
                  --enable-expert-parallel \
                  --enable-ep-weight-filter \
                  --enable-cumem-allocator \
                  --tensor-parallel-size 1 \
                  --data-parallel-size $((LWS_GROUP_SIZE * 4)) \
                  --data-parallel-size-local 4 \
                  --data-parallel-address ${LWS_LEADER_ADDRESS} \
                  --data-parallel-rpc-port 5555 \
                  --data-parallel-start-rank $START_RANK \
                  --kv_transfer_config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}' \
                  --moe-backend deep_gemm_mega_moe \
                  --enforce-eager \
                  --max-model-len 16384 \
                  --max-num-batched-tokens 32768 \
                  --block-size 256 \
                  --no-disable-hybrid-kv-cache-manager \
                  --no-async-scheduling \
                  --enable-sleep-mode \
                  --numa-bind \
                  --kv-cache-dtype fp8 \
                  --enable-force-include-usage

            env:
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/local/hf_cache
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_SKIP_P2P_CHECK
                value: "1"
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled
              - name: TILELANG_CLEANUP_TEMP_FILES
                value: "1"
              - name: NCCL_MNNVL_ENABLE
                value: "1"
              - name: NCCL_NVLS_ENABLE
                value: "1"
              - name: NCCL_CUMEM_ENABLE
                value: "1"
              - name: NCCL_P2P_LEVEL
                value: NVL
              - name: VLLM_USE_NCCL_SYMM_MEM
                value: "1"
              - name: TORCH_SYMMMEM
                value: NVSHMEM
              - name: UCX_NET_DEVICES
                value: "mlx5_0:1,mlx5_1:1,mlx5_3:1,mlx5_4:1"
              - name: GLOO_SOCKET_IFNAME
                value: eth0
              - name: NCCL_SOCKET_IFNAME
                value: eth0
              - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"
              - name: VLLM_LOGGING_LEVEL
                value: INFO
            ports:
              - containerPort: 8000
                name: modelserver
                protocol: TCP
            startupProbe:
              httpGet:
                path: /health
                port: 8000
              initialDelaySeconds: 0
              periodSeconds: 1
              timeoutSeconds: 5
              failureThreshold: 2700
            livenessProbe:
              httpGet:
                path: /health
                port: 8000
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /v1/models
                port: 8000
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre
                name: lustre
              - mountPath: /mnt/local
                name: local-nvme
