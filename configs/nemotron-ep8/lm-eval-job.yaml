apiVersion: batch/v1
kind: Job
metadata:
  name: JOB_NAME_PLACEHOLDER
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
    llm-d.ai/role: evaluation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        llm-d.ai/inference-serving: "true"
        llm-d.ai/model: NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
        llm-d.ai/role: evaluation
    spec:
      serviceAccountName: nightly-nemotron
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
      volumes:
        - name: lustre
          persistentVolumeClaim:
            claimName: lustre-pvc-vllm
      containers:
        - name: lm-eval
          image: VLLM_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
          args:
            - |-
              set -euo pipefail
              source /opt/vllm/bin/activate
              uv pip install lm-eval[api]

              GATEWAY="GATEWAY_URL_PLACEHOLDER"
              echo "Waiting for gateway at $GATEWAY..."
              until curl -sf "$GATEWAY/v1/models" | grep -q '"id"'; do
                echo "Gateway not ready, waiting..."
                sleep 10
              done

              MODEL=$(curl -sf "$GATEWAY/v1/models" | jq -r '.data[0].id')
              echo "Detected model: $MODEL"

              echo "Starting lm-eval evaluation..."
              lm_eval \
                --model local-completions \
                --tasks gsm8k_cot \
                --model_args "model=$MODEL,base_url=$GATEWAY/v1/completions,num_concurrent=2048,tokenized_requests=False" \
                --batch_size auto \
                --output_path RESULTS_DIR_PLACEHOLDER

              echo "lm-eval evaluation completed!"
          env:
            - name: HF_HOME
              value: /mnt/local/hf_cache
            - name: TRANSFORMERS_CACHE
              value: /mnt/local/hf_cache
            - name: HF_HUB_CACHE
              value: /mnt/local/hf_cache
            - name: CUDA_HOME
              value: "/usr/local/cuda-13"
            - name: TRITON_LIBCUDA_PATH
              value: /usr/lib64
            - name: TOKENIZERS_PARALLELISM
              value: "false"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 16
              ephemeral-storage: 50Gi
              memory: 128Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 16
              ephemeral-storage: 50Gi
              memory: 128Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: lustre
              mountPath: /mnt/lustre
