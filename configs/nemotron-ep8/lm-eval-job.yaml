apiVersion: batch/v1
kind: Job
metadata:
  name: JOB_NAME_PLACEHOLDER
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
    llm-d.ai/role: evaluation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        llm-d.ai/inference-serving: "true"
        llm-d.ai/model: NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
        llm-d.ai/role: evaluation
    spec:
      serviceAccountName: nightly-nemotron
      restartPolicy: Never
      nodeSelector:
        oci.oraclecloud.com/rack-name: oci-bth-aiaccelerator-prd005-hpc-rack-1
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: lustre
          persistentVolumeClaim:
            claimName: lustre-pvc-vllm
        - name: local-nvme
          hostPath:
            path: /mnt/numa0
            type: Directory
      containers:
        - name: lm-eval
          image: VLLM_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
          args:
            - |-
              set -euo pipefail
              uv venv /tmp/lm_eval -p 3.12 -q
              uv pip install --python /tmp/lm_eval/bin/python "lm_eval[api]" math_verify
              export PATH="/tmp/lm_eval/bin:$PATH"

              GATEWAY="GATEWAY_URL_PLACEHOLDER"
              echo "Waiting for gateway at $GATEWAY..."
              until curl -sf "$GATEWAY/v1/models" | grep -q '"id"'; do
                echo "Gateway not ready, waiting..."
                sleep 10
              done

              MODEL=$(curl -sf "$GATEWAY/v1/models" | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")
              echo "Detected model: $MODEL"

              echo "Starting lm-eval evaluation..."
              lm_eval \
                --model local-chat-completions \
                --tasks adlr_gsm8k_chat_cot \
                --include_path /mnt/lustre/nightly/tasks \
                --model_args "model=$MODEL,base_url=$GATEWAY/v1/chat/completions,num_concurrent=512,max_retries=3,tokenized_requests=False,max_gen_toks=8192,timeout=1200" \
                --apply_chat_template \
                --num_fewshot 0 \
                --log_samples \
                --output_path RESULTS_DIR_PLACEHOLDER

              echo "lm-eval evaluation completed!"
          env:
            - name: HF_HOME
              value: /tmp/hf_cache
            - name: TOKENIZERS_PARALLELISM
              value: "false"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 8
              memory: 16Gi
            limits:
              cpu: 8
              memory: 16Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: lustre
              mountPath: /mnt/lustre
            - name: local-nvme
              mountPath: /mnt/local
