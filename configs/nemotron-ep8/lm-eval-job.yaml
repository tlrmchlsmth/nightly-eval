apiVersion: batch/v1
kind: Job
metadata:
  name: JOB_NAME_PLACEHOLDER
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
    llm-d.ai/role: evaluation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        llm-d.ai/inference-serving: "true"
        llm-d.ai/model: NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4
        llm-d.ai/role: evaluation
    spec:
      serviceAccountName: nightly-nemotron
      restartPolicy: Never
      nodeSelector:
        oci.oraclecloud.com/rack-name: oci-bth-aiaccelerator-prd005-hpc-rack-1
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: lustre
          persistentVolumeClaim:
            claimName: lustre-pvc-vllm
        - name: local-nvme
          hostPath:
            path: /mnt/numa0
            type: Directory
      containers:
        - name: lm-eval
          image: nvcr.io/nvidia/eval-factory/lm-evaluation-harness:25.10
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
          args:
            - |-
              set -euo pipefail

              GATEWAY="GATEWAY_URL_PLACEHOLDER"
              echo "Waiting for gateway at $GATEWAY..."
              until curl -sf "$GATEWAY/v1/models" | grep -q '"id"'; do
                echo "Gateway not ready, waiting..."
                sleep 10
              done

              MODEL=$(curl -sf "$GATEWAY/v1/models" | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")
              echo "Detected model: $MODEL"

              # Workaround 1: vLLM's --reasoning-parser returns content=null when
              # the model exhausts max_tokens inside <think>. lm_eval's
              # RegexFilter crashes on None.
              EXTRACT_PY=$(python3 -c "import lm_eval.filters.extraction; print(lm_eval.filters.extraction.__file__)")
              sed -i 's/match = self.regex.findall(resp)/match = self.regex.findall(resp if resp is not None else "")/' "$EXTRACT_PY"

              # Workaround 2: --reasoning-parser splits output into
              # reasoning_content and content fields. Nemotron puts everything
              # (including the final answer) inside <think>, so content is
              # empty. Patch lm_eval to concatenate both fields.
              OPENAI_PY=$(python3 -c "import lm_eval.models.openai_completions; print(lm_eval.models.openai_completions.__file__)")
              sed -i 's|return \[outputs\["choices"\]\[0\]\["message"\]\["content"\]\]|_m = outputs["choices"][0]["message"]; _r = _m.get("reasoning_content") or ""; _c = _m.get("content") or ""; return [(_r + chr(10) + _c).strip() if _r else _c]|' "$OPENAI_PY"

              echo "Starting lm-eval evaluation..."
              lm_eval \
                --model local-chat-completions \
                --tasks gsm8k_cot_zeroshot \
                --model_args "model=$MODEL,base_url=$GATEWAY/v1/chat/completions,num_concurrent=128,max_retries=5,tokenized_requests=False,max_gen_toks=32768,timeout=1200" \
                --apply_chat_template \
                --num_fewshot 0 \
                --log_samples \
                --output_path RESULTS_DIR_PLACEHOLDER

              echo "lm-eval evaluation completed!"
          env:
            - name: HF_HOME
              value: /tmp/hf_cache
            - name: TOKENIZERS_PARALLELISM
              value: "false"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 8
              memory: 16Gi
            limits:
              cpu: 8
              memory: 16Gi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: lustre
              mountPath: /mnt/lustre
            - name: local-nvme
              mountPath: /mnt/local
