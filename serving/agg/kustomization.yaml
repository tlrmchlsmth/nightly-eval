apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: nightly-
resources:
  - ../base
patches:
  # Kueue queue label (decode only — prefill is deleted below)
  - path: ../kueue-labels-patch.yaml
    target:
      kind: LeaderWorkerSet
      name: wide-ep-decode

  # Remove prefill LWS (aggregated has no prefill)
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-prefill
    patch: |
      $patch: delete
      apiVersion: leaderworkerset.x-k8s.io/v1
      kind: LeaderWorkerSet
      metadata:
        name: wide-ep-prefill

  # Aggregated mode: deployment label
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-decode
    patch: |-
      - op: add
        path: /metadata/labels/llm-d.ai~1deployment
        value: agg
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/metadata/labels/llm-d.ai~1deployment
        value: agg
