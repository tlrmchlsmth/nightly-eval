apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-decode
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/model: DeepSeek-V4-Pro
    llm-d.ai/role: decode
spec:
  replicas: 1
  rolloutStrategy:
    type: RollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 100%
  leaderWorkerTemplate:
    size: 2
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/deploy-ts: DEPLOY_TS_PLACEHOLDER
          llm-d.ai/inference-serving: "true"
          llm-d.ai/model: DeepSeek-V4-Pro
          llm-d.ai/owner: OWNER_PLACEHOLDER
          llm-d.ai/role: decode
      spec:
        serviceAccountName: deepseek-v4
        terminationGracePeriodSeconds: 0
        nodeSelector:
          oci.oraclecloud.com/rack-name: oci-bth-aiaccelerator-prd005-hpc-rack-1
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
          - name: local-nvme
            hostPath:
              path: /mnt/numa0
              type: Directory
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        initContainers:
          - name: routing-proxy
            image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.8.0
            imagePullPolicy: Always
            args:
              - --port=8000
              - --vllm-port=8200
              - --data-parallel-size=4
              - --secure-proxy=false
              - --connector=nixlv2
            ports:
              - containerPort: 8000
                name: rank0
                protocol: TCP
              - containerPort: 8001
                name: rank1
                protocol: TCP
              - containerPort: 8002
                name: rank2
                protocol: TCP
              - containerPort: 8003
                name: rank3
                protocol: TCP
            restartPolicy: Always
            resources:
              limits:
                cpu: 8
                memory: 16Gi
              requests:
                cpu: 8
                memory: 16Gi
            securityContext:
              allowPrivilegeEscalation: false
        containers:
          - name: vllm
            image: VLLM_IMAGE_PLACEHOLDER
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                set -euo pipefail
                LOG_DIR=LUSTRE_PREFIX_PLACEHOLDER/logs/decode
                mkdir -p "$LOG_DIR"
                LOG_FILE="$LOG_DIR/${HOSTNAME}_$(date +%Y%m%d-%H%M%S).log"
                exec > >(tee -a "$LOG_FILE") 2>&1
                echo "=== Pod $HOSTNAME started at $(date -Iseconds) ==="

                FORK_REPO="FORK_REPO_PLACEHOLDER"
                FORK_BRANCH="FORK_BRANCH_PLACEHOLDER"
                if [ -n "$FORK_BRANCH" ] && [ -d /opt/vllm-source ]; then
                  cd /opt/vllm-source
                  git remote add fork "$FORK_REPO" 2>/dev/null || git remote set-url fork "$FORK_REPO"
                  git fetch fork "$FORK_BRANCH"
                  git checkout "fork/$FORK_BRANCH"
                  echo "=== Checked out fork/$FORK_BRANCH at $(date) ==="
                  cd -
                fi

                pip install "nvidia-cudnn-frontend<1.22"

                if [ -n "${NVSHMEM_CUMEM_HANDLE_TYPE:-}" ]; then
                  export NVSHMEM_QP_DEPTH=$((MAX_TOKENS * 2 + 2))
                  pip install --upgrade --no-build-isolation nvidia-nccl-cu13
                  NCCL_LIB=$(python3 -c "import nvidia.nccl; print(nvidia.nccl.__path__[0])")/lib
                  export LD_LIBRARY_PATH="${NCCL_LIB}:${LD_LIBRARY_PATH:-}"
                  echo "Installed NCCL from PyPI, lib at $NCCL_LIB"
                fi

                find /dev/shm -type f -delete

                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                exec vllm serve \
                  deepseek-ai/DeepSeek-V4-Pro \
                  --port 8200 \
                  --tokenizer-mode deepseek_v4 \
                  --gpu-memory-utilization 0.9 \
                  --trust-remote-code \
                  --api-server-count 1 \
                  --disable-uvicorn-access-log \
                  --data-parallel-hybrid-lb \
                  --enable-expert-parallel \
                  --enable-ep-weight-filter \
                  --enable-cumem-allocator \
                  --tensor-parallel-size $TP_SIZE \
                  --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                  --data-parallel-size-local $DP_SIZE_LOCAL \
                  --data-parallel-address ${LWS_LEADER_ADDRESS} \
                  --data-parallel-rpc-port 5555 \
                  --data-parallel-start-rank $START_RANK \
                  --kv_transfer_config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}' \
                  --moe-backend deep_gemm_mega_moe \
                  --max-num-batched-tokens $MAX_TOKENS \
                  --max-num-seqs $MAX_TOKENS \
                  --max-cudagraph-capture-size $MAX_TOKENS \
                  --block-size 256 \
                  --no-disable-hybrid-kv-cache-manager \
                  --enable-sleep-mode \
                  --stream-interval 50 \
                  --kv-cache-dtype fp8 \
                  --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY","custom_ops":["all"]}' \
                  --enable-force-include-usage

            env:
              - name: MAX_TOKENS
                value: "512"
              - name: DP_SIZE_LOCAL
                value: "4"
              - name: TP_SIZE
                value: "1"

              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/local/hf_cache


              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_SKIP_P2P_CHECK
                value: "1"
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled
              - name: TILELANG_CLEANUP_TEMP_FILES
                value: "1"

              - name: NCCL_MNNVL_ENABLE
                value: "1"
              - name: NCCL_NVLS_ENABLE
                value: "1"
              - name: NCCL_CUMEM_ENABLE
                value: "1"
              - name: NCCL_P2P_LEVEL
                value: NVL
              - name: VLLM_USE_NCCL_SYMM_MEM
                value: "1"
              - name: TORCH_SYMMMEM
                value: NVSHMEM

              - name: UCX_CUDA_IPC_ENABLE_MNNVL
                value: "y"
              - name: UCX_TLS
                value: cuda_copy,cuda_ipc,tcp
              - name: UCX_MEMTYPE_CACHE
                value: "n"
              - name: UCX_MEMTYPE_REG_WHOLE
                value: "n"
              - name: UCX_NET_DEVICES
                value: "mlx5_0:1,mlx5_1:1,mlx5_3:1,mlx5_4:1"

              - name: GLOO_SOCKET_IFNAME
                value: eth0
              - name: NCCL_SOCKET_IFNAME
                value: eth0

              - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP

              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"
              - name: VLLM_LOGGING_LEVEL
                value: INFO

            ports:
              - containerPort: 8200
                name: modelserver
                protocol: TCP
            startupProbe:
              httpGet:
                path: /health
                port: 8200
              initialDelaySeconds: 0
              periodSeconds: 1
              timeoutSeconds: 5
              failureThreshold: 2700
            livenessProbe:
              httpGet:
                path: /health
                port: 8200
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /v1/models
                port: 8200
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre
                name: lustre
              - mountPath: /mnt/local
                name: local-nvme
