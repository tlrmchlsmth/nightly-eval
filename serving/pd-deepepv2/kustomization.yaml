apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: nightly-
resources:
  - ../base
patches:
  # Kueue queue label
  - path: ../kueue-labels-patch.yaml
    target:
      kind: LeaderWorkerSet

  # P/D disaggregated mode: deployment label + NIXL side channel
  - target:
      kind: LeaderWorkerSet
    patch: |-
      - op: add
        path: /metadata/labels/llm-d.ai~1deployment
        value: pd
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/metadata/labels/llm-d.ai~1deployment
        value: pd
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

  # DeepEPv2-specific env vars (decode LWS only)
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-decode
    patch: |-
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: NVSHMEM_CUMEM_HANDLE_TYPE
          value: FABRIC
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: NVSHMEM_DISABLE_CUDA_VMM
          value: "0"
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
          value: "1"
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: VLLM_DEEPEP_BUFFER_SIZE_MB
          value: "0"
      - op: add
        path: /spec/leaderWorkerTemplate/workerTemplate/spec/containers/0/env/-
        value:
          name: DEEPEP_METRICS_ENABLED
          value: "1"
